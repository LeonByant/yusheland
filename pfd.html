<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>義消裝備風險管理系統 - 專業進階版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        .table-responsive {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .expired-row {
            background-color: #ffe5e5 !important;
        }

        .warning-row {
            background-color: #fff8e1 !important;
        }

        th {
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

            th:hover {
                background-color: #495057 !important;
            }

        .sort-icon {
            font-size: 0.8em;
            margin-left: 5px;
        }

        .card-header {
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h4 mb-0 text-primary fw-bold">🛡️ 裝備風險管理系統 <small class="text-muted fs-6">v3.0</small></h2>
            <button id="authBtn" class="btn btn-sm btn-outline-primary shadow-sm">管理員登入</button>
        </div>

        <div id="adminPanel" class="card mb-4 border-0 shadow-sm" style="display: none;">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <span>➕ 批次裝備入庫</span>
            </div>
            <div class="card-body">
                <div class="row g-2 mb-3">
                    <div class="col-md-2">
                        <label class="form-label small">類別代碼</label>
                        <input type="text" id="itemPrefix" class="form-control" placeholder="如: R">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">起始數字</label>
                        <input type="number" id="itemStartNum" class="form-control" placeholder="如: 1" min="1">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">入庫數量</label>
                        <input type="number" id="itemBatchCount" class="form-control" placeholder="件數" min="1" value="1">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">裝備全名</label>
                        <input type="text" id="itemName" class="form-control" placeholder="如: 11mm 靜力繩">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">供應商 / 備註</label>
                        <input type="text" id="itemNote" class="form-control" placeholder="廠商名稱或購買計畫">
                    </div>
                </div>
                <div class="row g-2">
                    <div class="col-md-3">
                        <label class="form-label small">歸屬狀態</label>
                        <select id="itemStatus" class="form-control">
                            <option value="隊上">存放隊上</option>
                            <option value="個人">個人領用</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">保管人 / 位置</label>
                        <input type="text" id="itemHolder" class="form-control" placeholder="姓名或車廂">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small text-info fw-bold">保固到期日</label>
                        <input type="date" id="itemWarranty" class="form-control">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small text-danger fw-bold">絕對失效日 (年限)</label>
                        <input type="date" id="itemExpiry" class="form-control">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button id="saveBtn" class="btn btn-success w-100 fw-bold">執行入庫</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover mb-0 text-center align-middle">
                <thead class="table-dark">
                    <tr>
                        <th onclick="sortTable('sn')">流水號 <span class="sort-icon">↕</span></th>
                        <th onclick="sortTable('name')">裝備名稱 <span class="sort-icon">↕</span></th>
                        <th onclick="sortTable('status')">歸屬 / 保管人 <span class="sort-icon">↕</span></th>
                        <th onclick="sortTable('expiryDate')">效期與保固狀態 <span class="sort-icon">↕</span></th>
                        <th id="actionHeader" style="display: none;">管理</th>
                    </tr>
                </thead>
                <tbody id="inventoryTableBody">
                    <tr><td colspan="5" class="py-5 text-muted">資料載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">📝 個體資料修正</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="mb-3">
                        <label class="form-label small text-muted">識別編號 (不可變動)</label>
                        <input type="text" id="editSN" class="form-control bg-light fw-bold" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">裝備名稱</label>
                        <input type="text" id="editName" class="form-control">
                    </div>
                    <div class="row mb-3">
                        <div class="col-4">
                            <label class="form-label">狀態</label>
                            <select id="editStatus" class="form-control">
                                <option value="隊上">隊上</option>
                                <option value="個人">個人</option>
                            </select>
                        </div>
                        <div class="col-8">
                            <label class="form-label">保管人/位置</label>
                            <input type="text" id="editHolder" class="form-control">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="form-label text-info fw-bold">保固到期日</label>
                            <input type="date" id="editWarranty" class="form-control">
                        </div>
                        <div class="col-6">
                            <label class="form-label text-danger fw-bold">絕對失效日</label>
                            <input type="date" id="editExpiry" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">供應商 / 備註</label>
                        <textarea id="editNote" class="form-control" rows="2" placeholder="採購來源、廠商聯絡方式或特殊註記"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="updateBtn" class="btn btn-primary w-100 fw-bold">更新存檔</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX12aOwkhf_C3MqsIonnmhg69W1UZRgHE",
            authDomain: "yusheland.firebaseapp.com",
            projectId: "yusheland",
            storageBucket: "yusheland.firebasestorage.app",
            messagingSenderId: "199797086046",
            appId: "1:199797086046:web:1f4b823d2a31ddc730a1cf",
            measurementId: "G-X733MEWBW1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const bsEditModal = new bootstrap.Modal(document.getElementById('editModal'));

        let isAdmin = false;
        let equipmentData = [];
        let sortField = 'sn';
        let sortOrder = 'asc';

        window.sortTable = (field) => {
            if (sortField === field) sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
            else { sortField = field; sortOrder = 'asc'; }
            renderTable();
        };

        function renderTable() {
            const tbody = document.getElementById('inventoryTableBody');
            document.getElementById('actionHeader').style.display = isAdmin ? "table-cell" : "none";

            equipmentData.sort((a, b) => {
                let valA = a[sortField] || "";
                let valB = b[sortField] || "";
                if (typeof valA === 'string') valA = valA.toLowerCase();
                if (typeof valB === 'string') valB = valB.toLowerCase();
                return valA.localeCompare(valB, undefined, { numeric: true, sensitivity: 'base' }) * (sortOrder === 'asc' ? 1 : -1);
            });

            tbody.innerHTML = "";
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const threeMonthsLater = new Date();
            threeMonthsLater.setMonth(now.getMonth() + 3);

            equipmentData.forEach((data) => {
                // 處理失效日邏輯 (生命安全)
                const expiry = data.expiryDate ? new Date(data.expiryDate) : null;
                let rowClass = "";
                let expiryTag = data.expiryDate ? `年限: ${data.expiryDate}` : '<span class="text-muted">年限: 未設</span>';

                if (expiry) {
                    if (expiry < now) {
                        rowClass = "expired-row";
                        expiryTag += '<br><span class="badge bg-danger mt-1">❗ 禁勘使用 (已過期)</span>';
                    } else if (expiry < threeMonthsLater) {
                        rowClass = "warning-row";
                        expiryTag += '<br><span class="badge bg-warning text-dark mt-1">⚠️ 屆期預警</span>';
                    }
                }

                // 處理保固日邏輯 (廠商維修)
                let warrantyTag = "";
                if (data.warrantyDate) {
                    if (data.warrantyDate >= todayStr) {
                        warrantyTag = `<br><span class="badge bg-info text-dark mt-1">🛡️ 保固至 ${data.warrantyDate}</span>`;
                    } else {
                        warrantyTag = `<br><span class="badge bg-secondary mt-1">過保</span>`;
                    }
                }

                const actionButtons = isAdmin ? `
                        <button class="btn btn-sm btn-dark" onclick="openEditModal('${data.id}')">修正</button>
                        <button class="btn btn-sm btn-outline-danger ms-1" onclick="deleteItem('${data.id}', '${data.sn}')">刪除</button>
                    ` : "";

                tbody.innerHTML += `
                        <tr class="${rowClass}">
                            <td class="fw-bold text-secondary text-nowrap">${data.sn}</td>
                            <td class="fw-bold">
                                ${data.name}
                                ${data.note ? `<br><small class="text-muted">${data.note}</small>` : ''}
                            </td>
                            <td class="text-nowrap">
                                <span class="badge ${data.status === '隊上' ? 'bg-success' : 'bg-warning text-dark'}">${data.status}</span>
                                <span class="ms-1">${data.holder || '-'}</span>
                            </td>
                            <td class="text-nowrap">
                                ${expiryTag}
                                ${warrantyTag}
                            </td>
                            ${isAdmin ? `<td>${actionButtons}</td>` : ""}
                        </tr>
                    `;
            });
        }

        onSnapshot(query(collection(db, "items")), (s) => {
            equipmentData = s.docs.map(d => ({ id: d.id, ...d.data() }));
            renderTable();
        });

        document.getElementById('saveBtn').onclick = async () => {
            if (!isAdmin) return;
            const prefix = document.getElementById('itemPrefix').value.trim().toUpperCase();
            const startNum = parseInt(document.getElementById('itemStartNum').value);
            const count = parseInt(document.getElementById('itemBatchCount').value);
            const name = document.getElementById('itemName').value.trim();
            const status = document.getElementById('itemStatus').value;
            const holder = document.getElementById('itemHolder').value.trim();
            const expiry = document.getElementById('itemExpiry').value;
            const warranty = document.getElementById('itemWarranty').value;
            const note = document.getElementById('itemNote').value.trim();

            if (!prefix || !startNum || !name) return alert("邏輯錯誤：類別代碼、起始序號與名稱不可為空。");
            if (count < 1 || count > 50) return alert("風險管控：單次入庫請介於 1~50 件之間。");
            if (status === '個人' && !holder) return alert("實名追蹤警告：個人領用必須註明領用人。");

            let duplicates = [];
            for (let i = 0; i < count; i++) {
                const sn = `${prefix}-${(startNum + i).toString().padStart(3, '0')}`;
                if (equipmentData.some(item => item.sn === sn)) duplicates.push(sn);
            }

            if (duplicates.length > 0) return alert(`編號衝突：以下編號已存在：\n${duplicates.join(', ')}`);
            if (!confirm(`確定入庫 ${count} 筆裝備？`)) return;

            try {
                const batch = writeBatch(db);
                for (let i = 0; i < count; i++) {
                    const sn = `${prefix}-${(startNum + i).toString().padStart(3, '0')}`;
                    const docRef = doc(collection(db, "items"));
                    batch.set(docRef, {
                        sn, name, status, holder: holder || "器材室",
                        expiryDate: expiry, warrantyDate: warranty, note: note, time: new Date()
                    });
                }
                await batch.commit();
                alert(`成功入庫 ${count} 件裝備。`);
                document.querySelectorAll('#adminPanel input').forEach(i => i.value = "");
            } catch (e) { alert("寫入失敗"); }
        };

        window.openEditModal = (id) => {
            const item = equipmentData.find(d => d.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('editSN').value = item.sn;
            document.getElementById('editName').value = item.name;
            document.getElementById('editStatus').value = item.status || "隊上";
            document.getElementById('editHolder').value = item.holder || "";
            document.getElementById('editExpiry').value = item.expiryDate || "";
            document.getElementById('editWarranty').value = item.warrantyDate || "";
            document.getElementById('editNote').value = item.note || "";
            bsEditModal.show();
        };

        document.getElementById('updateBtn').onclick = async () => {
            const id = document.getElementById('editId').value;
            const status = document.getElementById('editStatus').value;
            const holder = document.getElementById('editHolder').value.trim();
            if (status === '個人' && !holder) return alert("實名追蹤警告：個人領用必須註明領用人。");

            await updateDoc(doc(db, "items", id), {
                name: document.getElementById('editName').value,
                status: status,
                holder: holder,
                expiryDate: document.getElementById('editExpiry').value,
                warrantyDate: document.getElementById('editWarranty').value,
                note: document.getElementById('editNote').value
            });
            bsEditModal.hide();
        };

        window.deleteItem = async (id, sn) => {
            if (!isAdmin) return;
            if (!confirm(`確定刪除 [${sn}]？此動作不可撤銷。`)) return;
            const input = prompt(`請輸入編號 [${sn}] 確認刪除：`);
            if (input === sn) await deleteDoc(doc(db, "items", id));
        };

        onAuthStateChanged(auth, (u) => {
            isAdmin = !!u;
            document.getElementById('authBtn').innerText = isAdmin ? "登出系統" : "管理員登入";
            document.getElementById('adminPanel').style.display = isAdmin ? "block" : "none";
            renderTable();
        });

        document.getElementById('authBtn').onclick = () => {
            if (isAdmin) signOut(auth);
            else {
                const e = prompt("帳號："); const p = prompt("密碼：");
                if (e && p) signInWithEmailAndPassword(auth, e, p).catch(() => alert("失敗"));
            }
        };
    </script>
</body>
</html>
