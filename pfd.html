<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>裝備風險管理系統 | 專業版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-bg: #f8f9fc;
            --card-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.05);
            --header-bg: #1e293b;
        }

        body {
            background-color: var(--primary-bg);
            font-family: 'Noto Sans TC', sans-serif;
            color: #334155;
        }

        .app-header {
            background: var(--header-bg);
            color: white;
            padding: 1.5rem 0;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }

        .card-header {
            background-color: #f1f5f9;
            border-bottom: 1px solid #e2e8f0;
            color: #0f172a;
            font-weight: 700;
            padding: 1rem 1.5rem;
        }

        .table-responsive {
            background: white;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            padding: 0.5rem;
        }

        .table {
            margin-bottom: 0;
        }

            .table > :not(caption) > * > * {
                padding: 1rem 0.75rem;
                border-bottom-color: #f1f5f9;
                vertical-align: middle;
            }

        .table-dark {
            background-color: #334155;
            color: white;
            border-radius: 8px;
        }

            .table-dark th {
                background-color: #334155;
                border-color: #475569;
                font-weight: 500;
                cursor: pointer;
                user-select: none;
                white-space: nowrap;
            }

                .table-dark th:hover {
                    background-color: #475569;
                }

        .table-hover tbody tr:hover {
            background-color: #f8fafc;
        }

        .badge {
            padding: 0.5em 0.75em;
            font-weight: 500;
            border-radius: 50rem;
            letter-spacing: 0.5px;
        }

        .badge-team {
            background-color: #10b981;
            color: white;
        }

        .badge-personal {
            background-color: #f59e0b;
            color: white;
        }

        .expired-row {
            background-color: #fef2f2 !important;
        }

            .expired-row td {
                color: #991b1b;
            }

        .warning-row {
            background-color: #fffbeb !important;
        }

        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            padding: 0.6rem 1rem;
            font-size: 0.95rem;
        }

            .form-control:focus, .form-select:focus {
                border-color: #94a3b8;
                box-shadow: 0 0 0 0.25rem rgba(148, 163, 184, 0.25);
            }

        .form-label {
            font-weight: 500;
            color: #64748b;
            margin-bottom: 0.4rem;
        }

        .btn {
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: #2563eb;
            border-color: #2563eb;
        }

            .btn-primary:hover {
                background-color: #1d4ed8;
                border-color: #1d4ed8;
            }

        .btn-success {
            background-color: #059669;
            border-color: #059669;
        }

            .btn-success:hover {
                background-color: #047857;
                border-color: #047857;
            }

        .sort-icon {
            font-size: 0.75em;
            opacity: 0.5;
            margin-left: 4px;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0 fw-bold"><i class="bi bi-shield-check me-2 text-info"></i>裝備風險管理系統</h1>
            <button id="authBtn" class="btn btn-outline-light btn-sm"><i class="bi bi-person-circle me-1"></i>管理員登入</button>
        </div>
    </header>

    <div class="container mb-5">
        <div id="userInfoAlert" class="alert alert-light border shadow-sm py-2 mb-4 rounded-pill" style="display: none; width: fit-content;">
            <i class="bi bi-info-circle-fill text-primary me-2"></i>目前狀態：<strong class="text-dark">管理員模式 <span class='badge bg-primary ms-1'>可編輯</span></strong>
        </div>

        <div id="adminPanel" class="card mb-4" style="display: none;">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-box-seam me-2"></i>批次裝備入庫</span>
                <span class="badge bg-secondary"><i class="bi bi-upc-scan me-1"></i>自動生成序號</span>
            </div>
            <div class="card-body bg-white p-4">
                <div class="row g-3 mb-3">
                    <div class="col-md-2"><label class="form-label small">類別代碼</label><input type="text" id="itemPrefix" class="form-control" placeholder="如: R"></div>
                    <div class="col-md-2"><label class="form-label small">起始序號</label><input type="number" id="itemStartNum" class="form-control" placeholder="如: 1" min="1"></div>
                    <div class="col-md-2"><label class="form-label small">入庫件數</label><input type="number" id="itemBatchCount" class="form-control" placeholder="總數" min="1" value="1"></div>
                    <div class="col-md-3"><label class="form-label small">裝備全名</label><input type="text" id="itemName" class="form-control" placeholder="如: 11mm 靜力繩"></div>
                    <div class="col-md-3"><label class="form-label small">供應商 / 備註</label><input type="text" id="itemNote" class="form-control" placeholder="採購計畫或備註"></div>
                </div>
                <hr class="text-muted opacity-25">
                <div class="row g-3">
                    <div class="col-md-3"><label class="form-label small">歸屬狀態</label><select id="itemStatus" class="form-select"><option value="隊上">存放隊上</option><option value="個人">個人領用</option></select></div>
                    <div class="col-md-3"><label class="form-label small">保管人 / 位置</label><input type="text" id="itemHolder" class="form-control" placeholder="姓名或車廂"></div>
                    <div class="col-md-2"><label class="form-label small text-info fw-bold"><i class="bi bi-wrench me-1"></i>保固到期日</label><input type="date" id="itemWarranty" class="form-control"></div>
                    <div class="col-md-2"><label class="form-label small text-danger fw-bold"><i class="bi bi-hourglass-bottom me-1"></i>絕對失效日</label><input type="date" id="itemExpiry" class="form-control"></div>
                    <div class="col-md-2 d-flex align-items-end"><button id="saveBtn" class="btn btn-primary w-100 fw-bold"><i class="bi bi-cloud-arrow-up me-1"></i>執行入庫</button></div>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover mb-0 text-center align-middle">
                <thead class="table-dark">
                    <tr>
                        <th onclick="sortTable('sn')"><i class="bi bi-hash"></i> 流水號 <span class="sort-icon"><i class="bi bi-arrow-down-up"></i></span></th>
                        <th onclick="sortTable('name')"><i class="bi bi-tag"></i> 裝備名稱 <span class="sort-icon"><i class="bi bi-arrow-down-up"></i></span></th>
                        <th onclick="sortTable('status')"><i class="bi bi-geo-alt"></i> 歸屬 / 保管人 <span class="sort-icon"><i class="bi bi-arrow-down-up"></i></span></th>
                        <th onclick="sortTable('expiryDate')"><i class="bi bi-calendar-check"></i> 效期與保固 <span class="sort-icon"><i class="bi bi-arrow-down-up"></i></span></th>
                        <th id="actionHeader" style="display: none;"><i class="bi bi-sliders"></i> 管理操作</th>
                    </tr>
                </thead>
                <tbody id="inventoryTableBody">
                    <tr><td colspan="5" class="py-5 text-muted fw-bold">資料載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 16px; overflow: hidden;">
                <div class="modal-header bg-dark text-white border-0 p-4"><h5 class="modal-title fw-bold"><i class="bi bi-pencil-square me-2"></i>個體資料修正</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                <div class="modal-body p-4 bg-light">
                    <input type="hidden" id="editId">
                    <div class="mb-3"><label class="form-label small text-muted">識別編號 (不可變更)</label><input type="text" id="editSN" class="form-control bg-white fw-bold text-secondary" readonly></div>
                    <div class="mb-3"><label class="form-label">裝備名稱</label><input type="text" id="editName" class="form-control"></div>
                    <div class="row g-3 mb-3">
                        <div class="col-5"><label class="form-label">歸屬狀態</label><select id="editStatus" class="form-select"><option value="隊上">隊上</option><option value="個人">個人</option></select></div>
                        <div class="col-7"><label class="form-label">保管人 / 位置</label><input type="text" id="editHolder" class="form-control"></div>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-6"><label class="form-label text-info fw-bold">保固到期日</label><input type="date" id="editWarranty" class="form-control"></div>
                        <div class="col-6"><label class="form-label text-danger fw-bold">絕對失效日</label><input type="date" id="editExpiry" class="form-control"></div>
                    </div>
                    <div class="mb-1"><label class="form-label">供應商 / 備註</label><textarea id="editNote" class="form-control" rows="2"></textarea></div>
                </div>
                <div class="modal-footer bg-light border-0 px-4 pb-4">
                    <button type="button" class="btn btn-light border shadow-sm" data-bs-dismiss="modal">取消</button>
                    <button type="button" id="updateBtn" class="btn btn-primary fw-bold px-4 shadow-sm"><i class="bi bi-save me-1"></i>儲存變更</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX12aOwkhf_C3MqsIonnmhg69W1UZRgHE",
            authDomain: "yusheland.firebaseapp.com",
            projectId: "yusheland",
            storageBucket: "yusheland.firebasestorage.app",
            messagingSenderId: "199797086046",
            appId: "1:199797086046:web:1f4b823d2a31ddc730a1cf",
            measurementId: "G-X733MEWBW1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const bsEditModal = new bootstrap.Modal(document.getElementById('editModal'));

        // 🔴 請填入你的專屬 UID
        const ADMIN_UID = "TXVq1tA5L2OOqx36oiiQpqhYRv83";

        let isAdmin = false;
        let equipmentData = [];
        let sortField = 'sn';
        let sortOrder = 'asc';

        // 🟢 永遠監聽資料庫 (所有人都能看)
        onSnapshot(query(collection(db, "items")), (s) => {
            equipmentData = s.docs.map(d => ({ id: d.id, ...d.data() }));
            renderTable();
        }, (error) => {
            console.error(error);
            document.getElementById('inventoryTableBody').innerHTML = `<tr><td colspan="5" class="py-5 text-danger fw-bold"><i class="bi bi-exclamation-triangle-fill fs-4 d-block mb-2"></i>連線遭拒，請確認 Firebase 規則是否有開放 read: if true;</td></tr>`;
        });

        // 登入狀態控管 (僅控制介面按鈕顯示)
        onAuthStateChanged(auth, (user) => {
            const alertBox = document.getElementById('userInfoAlert');

            if (user && user.uid === ADMIN_UID) {
                isAdmin = true;
                document.getElementById('adminPanel').style.display = "block";
                alertBox.style.display = "block";
                document.getElementById('authBtn').innerHTML = '<i class="bi bi-box-arrow-right me-1"></i>登出系統';
                document.getElementById('authBtn').classList.replace('btn-outline-light', 'btn-danger');
            } else {
                isAdmin = false;
                document.getElementById('adminPanel').style.display = "none";
                alertBox.style.display = "none";
                document.getElementById('authBtn').innerHTML = '<i class="bi bi-person-circle me-1"></i>管理員登入';
                document.getElementById('authBtn').classList.replace('btn-danger', 'btn-outline-light');
            }
            renderTable(); // 重新畫表格決定要不要顯示操作按鈕
        });

        document.getElementById('authBtn').onclick = () => {
            if (isAdmin) { signOut(auth); }
            else {
                const e = prompt("請輸入管理員帳號："); if (!e) return;
                const p = prompt("請輸入密碼："); if (!p) return;
                signInWithEmailAndPassword(auth, e, p).catch((err) => alert("登入失敗，帳號或密碼錯誤"));
            }
        };

        window.sortTable = (field) => {
            // 現在任何人都可以點擊排序
            if (sortField === field) sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
            else { sortField = field; sortOrder = 'asc'; }
            renderTable();
        };

        function renderTable() {
            const tbody = document.getElementById('inventoryTableBody');
            document.getElementById('actionHeader').style.display = isAdmin ? "table-cell" : "none";

            equipmentData.sort((a, b) => {
                let valA = a[sortField] || ""; let valB = b[sortField] || "";
                if (typeof valA === 'string') valA = valA.toLowerCase();
                if (typeof valB === 'string') valB = valB.toLowerCase();
                return valA.localeCompare(valB, undefined, { numeric: true, sensitivity: 'base' }) * (sortOrder === 'asc' ? 1 : -1);
            });

            tbody.innerHTML = "";
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const threeMonthsLater = new Date(); threeMonthsLater.setMonth(now.getMonth() + 3);

            equipmentData.forEach((data) => {
                const expiry = data.expiryDate ? new Date(data.expiryDate) : null;
                let rowClass = "";
                let expiryTag = data.expiryDate ? `<span class="text-secondary"><i class="bi bi-flag me-1"></i>${data.expiryDate}</span>` : '<span class="text-muted opacity-50"><i class="bi bi-dash"></i>未設年限</span>';

                if (expiry) {
                    if (expiry < now) {
                        rowClass = "expired-row";
                        expiryTag += '<br><span class="badge bg-danger mt-1"><i class="bi bi-exclamation-octagon me-1"></i>禁勘使用 (已過期)</span>';
                    }
                    else if (expiry < threeMonthsLater) {
                        rowClass = "warning-row";
                        expiryTag += '<br><span class="badge bg-warning text-dark mt-1"><i class="bi bi-exclamation-triangle me-1"></i>屆期預警</span>';
                    }
                }

                let warrantyTag = "";
                if (data.warrantyDate) {
                    if (data.warrantyDate >= todayStr) warrantyTag = `<br><span class="badge bg-info text-dark mt-1"><i class="bi bi-shield-check me-1"></i>保固至 ${data.warrantyDate}</span>`;
                    else warrantyTag = `<br><span class="badge bg-secondary mt-1"><i class="bi bi-shield-slash me-1"></i>已過保</span>`;
                }

                const actionButtons = isAdmin ? `
                        <button class="btn btn-sm btn-outline-secondary fw-bold shadow-sm" onclick="openEditModal('${data.id}')"><i class="bi bi-pencil-square"></i></button>
                        <button class="btn btn-sm btn-outline-danger fw-bold ms-1 shadow-sm" onclick="deleteItem('${data.id}', '${data.sn}')"><i class="bi bi-trash3"></i></button>
                    ` : "";

                const statusBadgeClass = data.status === '隊上' ? 'badge-team' : 'badge-personal';

                tbody.innerHTML += `
                        <tr class="${rowClass}">
                            <td class="fw-bold text-secondary text-nowrap font-monospace">${data.sn}</td>
                            <td class="fw-bold text-dark">
                                ${data.name}
                                ${data.note ? `<br><small class="text-muted fw-normal"><i class="bi bi-info-circle me-1"></i>${data.note}</small>` : ''}
                            </td>
                            <td class="text-nowrap">
                                <span class="badge ${statusBadgeClass}">${data.status}</span>
                                <span class="ms-2 fw-medium text-secondary">${data.holder || '-'}</span>
                            </td>
                            <td class="text-nowrap">${expiryTag}${warrantyTag}</td>
                            ${isAdmin ? `<td class="text-nowrap">${actionButtons}</td>` : ""}
                        </tr>
                    `;
            });
            if (equipmentData.length === 0) tbody.innerHTML = `<tr><td colspan="5" class="py-5 text-muted fw-bold"><i class="bi bi-inbox fs-4 d-block mb-2"></i>資料庫目前無任何裝備紀錄</td></tr>`;
        }

        document.getElementById('saveBtn').onclick = async () => {
            if (!isAdmin) return;
            const prefix = document.getElementById('itemPrefix').value.trim().toUpperCase();
            const startNum = parseInt(document.getElementById('itemStartNum').value);
            const count = parseInt(document.getElementById('itemBatchCount').value);
            const name = document.getElementById('itemName').value.trim();
            const status = document.getElementById('itemStatus').value;
            const holder = document.getElementById('itemHolder').value.trim();
            const expiry = document.getElementById('itemExpiry').value;
            const warranty = document.getElementById('itemWarranty').value;
            const note = document.getElementById('itemNote').value.trim();

            if (!prefix || !startNum || !name) return alert("邏輯錯誤：類別代碼、起始序號與名稱不可為空。");
            if (count < 1 || count > 50) return alert("風險管控：單次入庫請介於 1~50 件之間。");
            if (status === '個人' && !holder) return alert("實名追蹤警告：個人領用必須註明領用人。");

            let duplicates = [];
            for (let i = 0; i < count; i++) {
                const sn = `${prefix}-${(startNum + i).toString().padStart(3, '0')}`;
                if (equipmentData.some(item => item.sn === sn)) duplicates.push(sn);
            }
            if (duplicates.length > 0) return alert(`編號衝突：以下編號已存在：\n${duplicates.join(', ')}`);
            if (!confirm(`確定入庫 ${count} 筆裝備？`)) return;

            try {
                const batch = writeBatch(db);
                for (let i = 0; i < count; i++) {
                    const sn = `${prefix}-${(startNum + i).toString().padStart(3, '0')}`;
                    const docRef = doc(collection(db, "items"));
                    batch.set(docRef, { sn, name, status, holder: holder || "器材室", expiryDate: expiry, warrantyDate: warranty, note: note, time: new Date() });
                }
                await batch.commit();
                alert(`成功入庫 ${count} 件裝備。`);
                document.querySelectorAll('#adminPanel input:not([type="number"])').forEach(i => i.value = "");
                document.getElementById('itemNote').value = "";
            } catch (e) { alert("寫入失敗"); }
        };

        window.openEditModal = (id) => {
            const item = equipmentData.find(d => d.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('editSN').value = item.sn;
            document.getElementById('editName').value = item.name;
            document.getElementById('editStatus').value = item.status || "隊上";
            document.getElementById('editHolder').value = item.holder || "";
            document.getElementById('editExpiry').value = item.expiryDate || "";
            document.getElementById('editWarranty').value = item.warrantyDate || "";
            document.getElementById('editNote').value = item.note || "";
            bsEditModal.show();
        };

        document.getElementById('updateBtn').onclick = async () => {
            const id = document.getElementById('editId').value;
            const status = document.getElementById('editStatus').value;
            const holder = document.getElementById('editHolder').value.trim();
            if (status === '個人' && !holder) return alert("實名追蹤警告：個人領用必須註明領用人。");

            await updateDoc(doc(db, "items", id), {
                name: document.getElementById('editName').value, status: status, holder: holder,
                expiryDate: document.getElementById('editExpiry').value, warrantyDate: document.getElementById('editWarranty').value, note: document.getElementById('editNote').value
            });
            bsEditModal.hide();
        };

        window.deleteItem = async (id, sn) => {
            if (!isAdmin) return;
            if (!confirm(`確定刪除 [${sn}]？此動作不可撤銷。`)) return;
            const input = prompt(`請輸入編號 [${sn}] 確認刪除：`);
            if (input === sn) await deleteDoc(doc(db, "items", id));
        };
    </script>
</body>
</html>
