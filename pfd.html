<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>義消裝備風險管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        .table-responsive {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .expired-row {
            background-color: #ffe5e5 !important;
        }

        th {
            cursor: pointer;
            user-select: none;
        }

            th:hover {
                background-color: #495057 !important;
            }

        .sort-icon {
            font-size: 0.8em;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h4 mb-0 text-primary">🛡️ 裝備風險管理系統</h2>
            <button id="authBtn" class="btn btn-sm btn-outline-primary shadow-sm">管理員登入</button>
        </div>

        <div id="adminPanel" class="card mb-4 border-0 shadow-sm" style="display: none;">
            <div class="card-header bg-dark text-white fw-bold">➕ 新增裝備 (管理員專區)</div>
            <div class="card-body row g-2">
                <div class="col-md-2"><input type="text" id="itemSN" class="form-control" placeholder="流水號"></div>
                <div class="col-md-2"><input type="text" id="itemName" class="form-control" placeholder="裝備名稱"></div>
                <div class="col-md-1"><input type="number" id="itemTotal" class="form-control" placeholder="數量" min="0"></div>
                <div class="col-md-2">
                    <select id="itemStatus" class="form-control">
                        <option value="隊上">存放隊上</option>
                        <option value="個人">個人領用</option>
                    </select>
                </div>
                <div class="col-md-2"><input type="text" id="itemHolder" class="form-control" placeholder="保管人/詳細位置"></div>
                <div class="col-md-2"><input type="date" id="itemExpiry" class="form-control" title="失效日期"></div>
                <div class="col-md-1"><button id="saveBtn" class="btn btn-success w-100">入庫</button></div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover mb-0 text-center align-middle text-nowrap">
                <thead class="table-dark">
                    <tr>
                        <th onclick="sortTable('sn')">流水號 <span class="sort-icon">↕</span></th>
                        <th onclick="sortTable('name')">裝備名稱 <span class="sort-icon">↕</span></th>
                        <th onclick="sortTable('status')">歸屬狀態 / 保管人 <span class="sort-icon">↕</span></th>
                        <th onclick="sortTable('currentQty')">庫存 / 總量 <span class="sort-icon">↕</span></th>
                        <th onclick="sortTable('expiryDate')">失效日期 <span class="sort-icon">↕</span></th>
                        <th id="actionHeader" style="display: none;">管理</th>
                    </tr>
                </thead>
                <tbody id="inventoryTableBody">
                    <tr><td colspan="6" class="py-5">資料串接中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">📝 編輯裝備屬性</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="mb-3">
                        <label class="form-label small text-muted">流水號 (鎖定防呆)</label>
                        <input type="text" id="editSN" class="form-control bg-light" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">裝備名稱</label>
                        <input type="text" id="editName" class="form-control">
                    </div>
                    <div class="row mb-3">
                        <div class="col"><label class="form-label">目前數量</label><input type="number" id="editCurrent" class="form-control" min="0"></div>
                        <div class="col"><label class="form-label">總數量</label><input type="number" id="editTotal" class="form-control" min="0"></div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-4">
                            <label class="form-label">歸屬狀態</label>
                            <select id="editStatus" class="form-control">
                                <option value="隊上">存放隊上</option>
                                <option value="個人">個人領用</option>
                            </select>
                        </div>
                        <div class="col-8">
                            <label class="form-label">詳細位置 / 保管人姓名</label>
                            <input type="text" id="editHolder" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">失效日期 (年限考量)</label>
                        <input type="date" id="editExpiry" class="form-control">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="updateBtn" class="btn btn-primary w-100">確認儲存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX12aOwkhf_C3MqsIonnmhg69W1UZRgHE",
            authDomain: "yusheland.firebaseapp.com",
            projectId: "yusheland",
            storageBucket: "yusheland.firebasestorage.app",
            messagingSenderId: "199797086046",
            appId: "1:199797086046:web:1f4b823d2a31ddc730a1cf",
            measurementId: "G-X733MEWBW1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const bsEditModal = new bootstrap.Modal(document.getElementById('editModal'));

        let isAdmin = false;
        let equipmentData = [];
        let sortField = 'sn';
        let sortOrder = 'asc';

        window.sortTable = (field) => {
            if (sortField === field) sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
            else { sortField = field; sortOrder = 'asc'; }
            renderTable();
        };

        function renderTable() {
            const tbody = document.getElementById('inventoryTableBody');
            document.getElementById('actionHeader').style.display = isAdmin ? "table-cell" : "none";

            equipmentData.sort((a, b) => {
                let valA = a[sortField] || "";
                let valB = b[sortField] || "";
                if (typeof valA === 'string') valA = valA.toLowerCase();
                if (typeof valB === 'string') valB = valB.toLowerCase();
                if (valA < valB) return sortOrder === 'asc' ? -1 : 1;
                if (valA > valB) return sortOrder === 'asc' ? 1 : -1;
                return 0;
            });

            tbody.innerHTML = "";
            const today = new Date().toISOString().split('T')[0];

            equipmentData.forEach((data) => {
                const isExpired = data.expiryDate && data.expiryDate < today;
                const rowClass = isExpired ? 'expired-row' : '';
                const statusBadge = data.status === '隊上' ? 'bg-success' : 'bg-warning text-dark';

                // 管理員按鈕區塊：新增了紅色的刪除按鈕
                const actionButtons = isAdmin ? `
                        <button class="btn btn-sm btn-dark" onclick="openEditModal('${data.id}')">修正</button>
                        <button class="btn btn-sm btn-outline-danger ms-1" onclick="deleteItem('${data.id}', '${data.sn}')">刪除</button>
                    ` : "";

                tbody.innerHTML += `
                        <tr class="${rowClass}">
                            <td><small class="text-muted">${data.sn}</small></td>
                            <td class="fw-bold">${data.name}</td>
                            <td>
                                <span class="badge ${statusBadge}">${data.status}</span>
                                <span class="ms-1">${data.holder || '未指定'}</span>
                            </td>
                            <td><span class="badge ${data.currentQty > 0 ? 'bg-primary' : 'bg-danger'}">${data.currentQty}</span> / ${data.totalQty}</td>
                            <td>
                                ${data.expiryDate || '未設限'}
                                ${isExpired ? '<br><span class="badge bg-danger">❗已過期</span>' : ''}
                            </td>
                            ${isAdmin ? `<td>${actionButtons}</td>` : ""}
                        </tr>
                    `;
            });
        }

        onSnapshot(query(collection(db, "items")), (s) => {
            equipmentData = s.docs.map(d => ({ id: d.id, ...d.data() }));
            renderTable();
        });

        // --- 刪除資料 (雙重確認防呆機制) ---
        window.deleteItem = async (id, sn) => {
            if (!isAdmin) return;

            // 第一層確認：基本警告
            if (!confirm(`【風險提示】您準備刪除流水號 [${sn}] 的裝備資料。\n刪除後將無法復原，是否繼續？`)) {
                return;
            }

            // 第二層確認：要求輸入流水號驗證
            const inputSN = prompt(`【二次確認】為避免誤刪，請輸入該裝備的流水號 [${sn}] 以執行徹底刪除：`);

            if (inputSN !== sn) {
                if (inputSN !== null) {
                    alert("輸入的流水號不符，已取消刪除操作。");
                }
                return; // 使用者按取消或輸入錯誤，中斷操作
            }

            // 兩層都通過，執行資料庫刪除
            try {
                await deleteDoc(doc(db, "items", id));
            } catch (error) {
                console.error("刪除失敗", error);
                alert("刪除失敗，請檢查網路連線。");
            }
        };

        // --- 防呆邏輯：新增裝備 ---
        document.getElementById('saveBtn').onclick = async () => {
            if (!isAdmin) return;
            const sn = document.getElementById('itemSN').value.trim();
            const name = document.getElementById('itemName').value.trim();
            const total = parseInt(document.getElementById('itemTotal').value) || 0;
            const status = document.getElementById('itemStatus').value;
            const holder = document.getElementById('itemHolder').value.trim();
            const expiry = document.getElementById('itemExpiry').value;

            if (!name || !sn) return alert("防呆機制：流水號與名稱為必填欄位。");
            if (total < 0) return alert("邏輯錯誤：實體裝備數量不可為負值。");

            const isDuplicate = equipmentData.some(item => item.sn === sn);
            if (isDuplicate) return alert("風險管控警告：此流水號已存在系統中，請勿重複登打！");
            if (status === '個人' && !holder) return alert("邏輯錯誤：若狀態為「個人領用」，必須填寫具體保管人姓名以釐清責任。");

            await addDoc(collection(db, "items"), {
                sn, name, totalQty: total, currentQty: total,
                status, holder: holder || "器材室", expiryDate: expiry, time: new Date()
            });
            document.querySelectorAll('#adminPanel input').forEach(i => i.value = "");
        };

        window.openEditModal = (id) => {
            const item = equipmentData.find(d => d.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('editSN').value = item.sn;
            document.getElementById('editName').value = item.name;
            document.getElementById('editCurrent').value = item.currentQty;
            document.getElementById('editTotal').value = item.totalQty;
            document.getElementById('editStatus').value = item.status || "隊上";
            document.getElementById('editHolder').value = item.holder || "";
            document.getElementById('editExpiry').value = item.expiryDate || "";
            bsEditModal.show();
        };

        // --- 防呆邏輯：編輯裝備 ---
        document.getElementById('updateBtn').onclick = async () => {
            const id = document.getElementById('editId').value;
            const currentQty = parseInt(document.getElementById('editCurrent').value) || 0;
            const totalQty = parseInt(document.getElementById('editTotal').value) || 0;
            const status = document.getElementById('editStatus').value;
            const holder = document.getElementById('editHolder').value.trim();

            if (currentQty < 0 || totalQty < 0) return alert("邏輯錯誤：實體裝備數量不可為負值。");
            if (status === '個人' && !holder) return alert("邏輯錯誤：若狀態為「個人領用」，必須填寫具體保管人姓名以釐清責任。");

            await updateDoc(doc(db, "items", id), {
                name: document.getElementById('editName').value,
                currentQty: currentQty,
                totalQty: totalQty,
                status: status,
                holder: holder,
                expiryDate: document.getElementById('editExpiry').value
            });
            bsEditModal.hide();
        };

        onAuthStateChanged(auth, (user) => {
            isAdmin = !!user;
            document.getElementById('authBtn').innerText = isAdmin ? "登出系統" : "管理員登入";
            document.getElementById('adminPanel').style.display = isAdmin ? "block" : "none";
            renderTable();
        });

        document.getElementById('authBtn').onclick = () => {
            if (isAdmin) signOut(auth);
            else {
                const email = prompt("管理員帳號：");
                const pw = prompt("密碼：");
                if (email && pw) signInWithEmailAndPassword(auth, email, pw).catch(() => alert("登入失敗"));
            }
        };
    </script>
</body>
</html>
