<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Firebase 連線測試</title>
</head>
<body>
    <h1>Firebase 連線測試</h1>
    <p>請按 F12 觀察 Console 訊息</p>
    <div id="status">正在嘗試連線...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.comfirebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.comfirebasejs/10.7.0/firebase-firestore.js";

        // 1. 【請替換這裡】貼上你的 Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAX12aOwkhf_C3MqsIonnmhg69W1UZRgHE",
            authDomain: "yusheland.firebaseapp.com",
            projectId: "yusheland",
            storageBucket: "yusheland.firebasestorage.app",
            messagingSenderId: "199797086046",
            appId: "1:199797086046:web:1f4b823d2a31ddc730a1cf",
            measurementId: "G-X733MEWBW1"
        };

        // 2. 初始化
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 3. 測試寫入一筆資料 (就像 PHP 的 INSERT)
        async function testFirebase() {
            try {
                const docRef = await addDoc(collection(db, "test_collection"), {
                    message: "恭喜！Firebase 連線並寫入成功！",
                    time: new Date()
                });
                console.log("寫入成功，文件 ID: ", docRef.id);
                document.getElementById('status').innerHTML = "✅ 連線與寫入成功！請去 Firebase 後台看 Data 分頁。";
            } catch (e) {
                console.error("錯誤訊息: ", e);
                document.getElementById('status').innerHTML = "❌ 失敗！錯誤原因請看 Console。";
            }
        }

        testFirebase();
    </script>
</body>
</html>
