<!DOCTYPE html>
<html>
<head>
    <title>Firebase 登入範例</title>
    <!-- 載入 Firebase SDK (模組化版本) -->
    <script type="importmap">
        {
          "imports": {
            "firebase/app": "https://www.gstatic.com",
            "firebase/auth": "https://www.gstatic.com"
          }
        }
    </script>
</head>
<body>
    <h1>我的動態網站</h1>
    <div id="user-info">
        <button id="login-btn">使用 Google 登入</button>
    </div>

    <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "firebase/auth";

    // 這裡貼上你在 Firebase 控制台取得的專案配置 (Firebase Config)
    const firebaseConfig = {
      apiKey: "你的API_KEY",
      authDomain: "你的專案.firebaseapp.com",
      projectId: "你的專案ID",
      storageBucket: "你的專案.appspot.com",
      messagingSenderId: "你的發送ID",
      appId: "你的APP_ID"
    };

    // 初始化 Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const provider = new GoogleAuthProvider();

    const btn = document.getElementById('login-btn');
    const userInfo = document.getElementById('user-info');

    // 1. 處理登入按鈕點擊
    btn.onclick = async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        console.error("登入失敗", error);
      }
    };

    // 2. 監聽登入狀態變化 (這就是動態效果！)
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // 登入成功：顯示使用者名字與登出按鈕
        userInfo.innerHTML = `
          <p>你好，${user.displayName}！</p>
          <img src="${user.photoURL}" width="50">
          <button id="logout-btn">登出</button>
        `;
        document.getElementById('logout-btn').onclick = () => signOut(auth);
      } else {
        // 未登入：回到初始狀態
        userInfo.innerHTML = `<button id="login-btn">使用 Google 登入</button>`;
        // 重新綁定事件，因為 DOM 被重刷了
        location.reload();
      }
    });
    </script>
</body>
</html>
