<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>裝備庫存管理</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .item-card {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <h1>🛡️ 裝備庫存系統</h1>

    <!-- 1. 輸入區塊 (像 PHP 的 Form，但不用指定 action) -->
    <div style="background: #f4f4f4; padding: 15px;">
        <input type="text" id="itemName" placeholder="裝備名稱 (如: 木劍)">
        <input type="number" id="itemQty" placeholder="數量" value="1">
        <button id="saveBtn">新增裝備</button>
    </div>

    <hr>

    <!-- 2. 顯示區塊 (原本 PHP 用 foreach 印出的地方) -->
    <h3>目前庫存清單：</h3>
    <div id="inventoryList">正在載入中...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        // 這裡多引入了 onSnapshot (監聽) 和 collection (集合)
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        // 引入需要的修改與刪除功能
        import { doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
   


        // 【請貼上你原本成功的 Config】
        const firebaseConfig = {
            apiKey: "AIzaSyAX12aOwkhf_C3MqsIonnmhg69W1UZRgHE",
            authDomain: "yusheland.firebaseapp.com",
            projectId: "yusheland",
            storageBucket: "yusheland.firebasestorage.app",
            messagingSenderId: "199797086046",
            appId: "1:199797086046:web:1f4b823d2a31ddc730a1cf",
            measurementId: "G-X733MEWBW1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- A. 讀取資料 (像 PHP 的 SELECT，但這是「即時監聽」版本) ---
        // 只要資料庫一變，這段程式碼會自動重新執行，網頁不用重整！
       

        // --- B. 新增資料 (像 PHP 的 INSERT) ---
        document.getElementById('saveBtn').onclick = async () => {
            const name = document.getElementById('itemName').value;
            const qty = document.getElementById('itemQty').value;

            if(!name) return alert("請輸入名稱");

            try {
                await addDoc(collection(db, "items"), {
                    name: name,
                    qty: parseInt(qty),
                    time: new Date()
                });
                // 清空輸入框
                document.getElementById('itemName').value = "";
                document.getElementById('itemQty').value = "1";
            } catch (e) {
                alert("儲存失敗：" + e);
            }



        };

        // --- 1. 修改資料 (Update) ---
        // 就像 PHP 的 UPDATE items SET qty = $newQty WHERE id = $id
        window.changeQty = async (id, currentQty, change) => {
            const newQty = currentQty + change;
            if (newQty < 0) return; // 不允許負數庫存

            const itemRef = doc(db, "items", id); // 找到那筆資料
            try {
                await updateDoc(itemRef, { qty: newQty });
                console.log("修改成功！");
                // 因為有 onSnapshot，網頁會自動更新，不用手動刷畫面！
            } catch (e) {
                alert("更新失敗：" + e);
            }
        };

        // --- 2. 刪除資料 (Delete) ---
        // 針對該 ID 進行刪除
        window.removeItem = async (id) => {
            if (!confirm("確定要變賣這件裝備嗎？")) return;

            const itemRef = doc(db, "items", id);
            try {
                await deleteDoc(itemRef);
                console.log("刪除成功！");
            } catch (e) {
                alert("刪除失敗");
            }
        };

        const q = query(collection(db, "items"), orderBy("time", "desc"));
        // --- 3. 修改顯示邏輯 (更新 onSnapshot 裡面的 HTML) ---
        // 請找到你原本的 snapshot.forEach 部分，改成這樣：
        onSnapshot(q, (snapshot) => {
            const listDiv = document.getElementById('inventoryList');
            listDiv.innerHTML = "";

            snapshot.forEach((item) => {
                const data = item.data();
                const id = item.id; // 這是 Firebase 自動產生的亂碼 ID (像 MySQL 的 Primary Key)

                listDiv.innerHTML += `
     <div class="item-card" style="border:1px solid #ccc; margin:5px; padding:10px; display:flex; justify-content:space-between;">
         <span><b>${data.name}</b> (數量: ${data.qty})</span>
         <div>
             <button onclick="changeQty('${id}', ${data.qty}, 1)">＋</button>
             <button onclick="changeQty('${id}', ${data.qty}, -1)">－</button>
             <button onclick="removeItem('${id}')" style="color:red; margin-left:10px;">刪除</button>
         </div>
     </div>
 `;
            });
        });
        </script>
</body>
</html>
