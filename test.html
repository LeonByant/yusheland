<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>義消裝備庫存管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 微調一點樣式讓手機版更易讀 */
        body {
            background-color: #f8f9fa;
        }

        .table-responsive {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>
    <div class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h4 mb-0">🛡️ 裝備庫存系統</h2>
            <button id="authBtn" class="btn btn-sm btn-outline-primary">管理員登入</button>
        </div>

        <div id="adminPanel" class="card mb-4 shadow-sm" style="display: none;">
            <div class="card-header bg-dark text-white fw-bold">➕ 新增裝備 (管理員專區)</div>
            <div class="card-body row g-2">
                <div class="col-md-3">
                    <input type="text" id="itemSN" class="form-control" placeholder="流水號 (例: R-001)">
                </div>
                <div class="col-md-3">
                    <input type="text" id="itemName" class="form-control" placeholder="裝備名稱 (例: 11mm 靜力繩)">
                </div>
                <div class="col-md-2">
                    <input type="number" id="itemTotal" class="form-control" placeholder="總數量">
                </div>
                <div class="col-md-2">
                    <input type="text" id="itemHolder" class="form-control" placeholder="放置處/保管人">
                </div>
                <div class="col-md-2">
                    <button id="saveBtn" class="btn btn-success w-100">入庫</button>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover table-striped mb-0 text-center align-middle text-nowrap">
                <thead class="table-dark">
                    <tr>
                        <th>流水號</th>
                        <th>裝備名稱</th>
                        <th>保管人/位置</th>
                        <th>目前庫存 / 總量</th>
                        <th id="actionHeader" style="display: none;">管理操作</th>
                    </tr>
                </thead>
                <tbody id="inventoryTableBody">
                    <tr><td colspan="5" class="py-4">資料載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        // 【請替換成你的 Firebase Config】
        const firebaseConfig = {
            apiKey: "AIzaSyAX12aOwkhf_C3MqsIonnmhg69W1UZRgHE",
            authDomain: "yusheland.firebaseapp.com",
            projectId: "yusheland",
            storageBucket: "yusheland.firebasestorage.app",
            messagingSenderId: "199797086046",
            appId: "1:199797086046:web:1f4b823d2a31ddc730a1cf",
            measurementId: "G-X733MEWBW1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let isAdmin = false;
        let equipmentData = [];

        function renderTable() {
            const tbody = document.getElementById('inventoryTableBody');
            const actionHeader = document.getElementById('actionHeader');
            tbody.innerHTML = "";

            actionHeader.style.display = isAdmin ? "table-cell" : "none";

            if (equipmentData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="py-4 text-muted">目前沒有裝備紀錄。</td></tr>`;
                return;
            }

            equipmentData.forEach((data) => {
                const actionButtons = isAdmin ? `
                        <div class="btn-group" role="group">
                            <button class="btn btn-sm btn-outline-secondary" onclick="changeQty('${data.id}', ${data.currentQty}, -1)">-</button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="changeQty('${data.id}', ${data.currentQty}, 1)">+</button>
                        </div>
                        <button class="btn btn-sm btn-outline-danger ms-2" onclick="removeItem('${data.id}')">報廢</button>
                    ` : "";

                const actionCell = isAdmin ? `<td>${actionButtons}</td>` : "";

                tbody.innerHTML += `
                        <tr>
                            <td class="text-muted">${data.sn || '無'}</td>
                            <td class="fw-bold">${data.name}</td>
                            <td>${data.holder || '倉庫'}</td>
                            <td>
                                <span class="badge ${data.currentQty > 0 ? 'bg-primary' : 'bg-danger'} fs-6">
                                    ${data.currentQty}
                                </span> / <span class="text-muted">${data.totalQty}</span>
                            </td>
                            ${actionCell}
                        </tr>
                    `;
            });
        }

        const q = query(collection(db, "items"), orderBy("time", "desc"));
        onSnapshot(q, (snapshot) => {
            equipmentData = [];
            snapshot.forEach((item) => {
                equipmentData.push({ id: item.id, ...item.data() });
            });
            renderTable();
        });

        onAuthStateChanged(auth, (user) => {
            const authBtn = document.getElementById('authBtn');
            const adminPanel = document.getElementById('adminPanel');

            if (user) {
                isAdmin = true;
                authBtn.innerText = "管理員登出";
                authBtn.classList.replace("btn-outline-primary", "btn-outline-danger");
                adminPanel.style.display = "block";
            } else {
                isAdmin = false;
                authBtn.innerText = "管理員登入";
                authBtn.classList.replace("btn-outline-danger", "btn-outline-primary");
                adminPanel.style.display = "none";
            }
            renderTable();
        });

        document.getElementById('authBtn').onclick = () => {
            if (isAdmin) {
                signOut(auth);
            } else {
                const email = prompt("請輸入管理員信箱：");
                if (!email) return;
                const password = prompt("請輸入密碼：");
                if (!password) return;

                signInWithEmailAndPassword(auth, email, password)
                    .then(() => alert("登入成功！已開啟編輯權限。"))
                    .catch((error) => alert("登入失敗，請檢查帳號密碼。"));
            }
        };

        window.changeQty = async (id, currentQty, change) => {
            if (!isAdmin) return;
            const newQty = currentQty + change;
            if (newQty < 0) return;
            try { await updateDoc(doc(db, "items", id), { currentQty: newQty }); } catch (e) { console.error(e); }
        };

        window.removeItem = async (id) => {
            if (!isAdmin) return;
            if (!confirm("邏輯確認：確定要將這件裝備報廢除役嗎？此操作無法復原。")) return;
            try { await deleteDoc(doc(db, "items", id)); } catch (e) { console.error(e); }
        };

        document.getElementById('saveBtn').onclick = async () => {
            if (!isAdmin) return;
            const sn = document.getElementById('itemSN').value;
            const name = document.getElementById('itemName').value;
            const total = parseInt(document.getElementById('itemTotal').value) || 0;
            const holder = document.getElementById('itemHolder').value || "倉庫";

            if (!name || !sn) return alert("請輸入流水號與裝備名稱");

            try {
                await addDoc(collection(db, "items"), {
                    sn: sn, name: name, totalQty: total, currentQty: total, holder: holder,
