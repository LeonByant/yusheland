<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>裝備庫存管理</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .item-card {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <h1>🛡️ 裝備庫存系統</h1>

    <!-- 1. 輸入區塊 (像 PHP 的 Form，但不用指定 action) -->
    <div style="background: #f4f4f4; padding: 15px;">
        <input type="text" id="itemName" placeholder="裝備名稱 (如: 木劍)">
        <input type="number" id="itemQty" placeholder="數量" value="1">
        <button id="saveBtn">新增裝備</button>
    </div>

    <hr>

    <!-- 2. 顯示區塊 (原本 PHP 用 foreach 印出的地方) -->
    <h3>目前庫存清單：</h3>
    <div id="inventoryList">正在載入中...</div>

    <script type="module">
        
   
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

        // 【請貼上你原本成功的 Config】
        const firebaseConfig = {
            apiKey: "AIzaSyAX12aOwkhf_C3MqsIonnmhg69W1UZRgHE",
            authDomain: "yusheland.firebaseapp.com",
            projectId: "yusheland",
            storageBucket: "yusheland.firebasestorage.app",
            messagingSenderId: "199797086046",
            appId: "1:199797086046:web:1f4b823d2a31ddc730a1cf",
            measurementId: "G-X733MEWBW1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.changeQty = async (id, currentQty, change) => {
            const newQty = currentQty + change;
            if (newQty < 0) return;
            try {
                await updateDoc(doc(db, "items", id), { currentQty: newQty });
            } catch (e) { console.error(e); }
        };

        // --- 報廢(刪除)功能 ---
        window.removeItem = async (id) => {
            if (!confirm("確定要報廢這件裝備嗎？")) return;
            try {
                await deleteDoc(doc(db, "items", id));
            } catch (e) { console.error(e); }
        };

        // --- 監聽並畫出畫面 ---
        const q = query(collection(db, "items"), orderBy("time", "desc"));
        onSnapshot(q, (snapshot) => {
            const listDiv = document.getElementById('inventoryList');
            listDiv.innerHTML = "";
            snapshot.forEach((item) => {
                const data = item.data();
                const id = item.id;
                listDiv.innerHTML += `
                <div class="item-card" style="background:white; border-radius:12px; padding:15px; margin-bottom:10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                    <div style="display:flex; justify-content:space-between; font-size:12px; color:#888;">
                        <span>SN: ${data.sn || '無'}</span>
                        <span>保管人: <b style="color:#4a90e2">${data.holder || '倉庫'}</b></span>
                    </div>
                    <div style="margin:10px 0; font-size:18px;"><b>${data.name}</b></div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:14px;">庫存：<b>${data.currentQty}</b> / ${data.totalQty}</span>
                        <div>
                            <button class="qty-btn" onclick="changeQty('${id}', ${data.currentQty}, -1)">-</button>
                            <button class="qty-btn" onclick="changeQty('${id}', ${data.currentQty}, 1)">+</button>
                            <button onclick="removeItem('${id}')" style="margin-left:10px; color:red; border:none; background:none; cursor:pointer;">報廢</button>
                        </div>
                    </div>
                </div>`;
            });
            if (snapshot.empty) listDiv.innerHTML = "目前沒有裝備造冊。";
        });

        // --- 新增按鈕 ---
        document.getElementById('saveBtn').onclick = async () => {
            const sn = document.getElementById('itemSN').value;
            const name = document.getElementById('itemName').value;
            const total = parseInt(document.getElementById('itemTotal').value) || 0;
            const holder = document.getElementById('itemHolder').value || "倉庫";

            if (!name || !sn) return alert("請輸入流水號與裝備名稱");

            try {
                await addDoc(collection(db, "items"), {
                    sn: sn,
                    name: name,
                    totalQty: total,
                    currentQty: total,
                    holder: holder,
                    time: new Date()
                });
                // 清空欄位
                document.getElementById('itemSN').value = "";
                document.getElementById('itemName').value = "";
                document.getElementById('itemTotal').value = "1";
                document.getElementById('itemHolder').value = "";
            } catch (e) { alert("儲存失敗"); }
        };
        </script>
</body>
</html>
